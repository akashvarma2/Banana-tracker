<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* KEEP YOUR EXISTING CSS EXACTLY AS-IS */
        /* (unchanged for safety) */
    </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash-screen">
    <img src="edited-image.png" class="splash-logo">
    <div class="splash-text">PULP PRO</div>
</div>

<!-- MENU -->
<div id="menu-trigger" onclick="toggleMenu()"><span></span></div>

<div id="menu-drawer">
    <div style="text-align:center; margin-bottom:40px;">
        <img src="edited-image.png" style="width:50px;">
        <div style="font-weight:900; color:var(--pulp-lime);">PULP PRO</div>
    </div>

    <div class="menu-item" onclick="showHub(); toggleMenu();">
        <span>🏠 Home</span>
    </div>

    <div class="menu-item" onclick="toggleTheme()">
        <span>🌓 Theme</span>
    </div>

    <div class="menu-item" onclick="clearHistory()">
        <span>⚠️ Clear Logs</span>
    </div>
</div>

<div id="menu-overlay" onclick="toggleMenu()"></div>

<!-- HUB -->
<div id="fruit-hub" class="nav-view">
    <div class="hub-title">Select Commodity</div>

    <div class="selection-card" onclick="openCalc('Chiquita')">
        <img src="banana.png">
        <div class="commodity-name-section">
            <span>Banana</span>
        </div>
    </div>
</div>

<!-- APP -->
<div class="app-container" id="appInterface">
    <div class="app-card">

        <img src="edited-image.png" style="width:50px;">
        <div id="brandName">Chiquita</div>

        <div class="input-wrapper">
            <input type="text" id="codeIn" placeholder="---" maxlength="3">
        </div>

        <button class="btn-main" onclick="checkCode()">Calculate</button>

        <div id="resBox" class="result-display hidden">
            <div id="statusLabel">READY</div>
            <div id="daysValue">--</div>
            <div id="dateText">--</div>
        </div>

    </div>

    <div class="history-section">
        <div id="historyList"></div>
    </div>
</div>

<!-- ⭐ GLOBAL BRIDGE (IMPORTANT FIX) -->
<script>
    function waitForModules() {
        const check = setInterval(() => {
            if (window.__coreReady) {
                clearInterval(check);
            }
        }, 50);
    }

    window.addEventListener('load', waitForModules);
</script>

<!-- MODULE ENTRY -->
<script type="module">
    import { initApp, checkCode } from './js/core.js';
    import * as UI from './js/ui.js';

    // expose ONLY safe entry points
    window.checkCode = () => checkCode();
    window.showHub = UI.showHub;
    window.toggleMenu = () => document.getElementById('menu-drawer').classList.toggle('open');
    window.toggleTheme = () => document.body.classList.toggle('light-theme');
    window.clearHistory = () => location.reload();

    initApp();

    window.__coreReady = true;
</script>

</body>
</html>
