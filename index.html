<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo">
        <div class="splash-text">PULP PRO</div>
    </div>

    <!-- Hamburger Menu Trigger -->
    <div id="menu-trigger" style="position:fixed; top:20px; left:20px; z-index:1001; cursor:pointer;" onclick="toggleMenu()">
        <i class="bi bi-list" style="font-size: 2rem; color: var(--pulp-lime);"></i>
    </div>

    <!-- Menu Drawer -->
    <div id="menu-drawer">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="edited-image.png" style="width:50px; margin-bottom:10px;">
            <div style="font-weight:900; color:var(--pulp-lime);">PULP PRO</div>
        </div>
        <div class="menu-item" onclick="showHub(); toggleMenu();"><span>🏠 Home</span></div>
        <div class="menu-item" onclick="toggleTheme()"><span>🌓 <span id="themeText">Dark Mode</span></span></div>
    </div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Main View: Commodity Selection -->
    <div id="fruit-hub" class="nav-view">
        <div class="hub-title">Select Commodity</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="openMiddleHub('banana')">
                <img src="banana.png" alt="banana">
                <div style="font-weight:700; font-size:0.8rem;">Banana</div>
            </div>
            <div class="selection-card" onclick="openMiddleHub('mango')">
                <img src="mango.png" alt="mango">
                <div style="font-weight:700; font-size:0.8rem;">Mango</div>
            </div>
            <div class="selection-card" onclick="openMiddleHub('avocado')">
                <img src="avocado.png" alt="avocado">
                <div style="font-weight:700; font-size:0.8rem;">Avocado</div>
            </div>
            <div class="selection-card" onclick="openDefectDetection()">
                <img src="rotten.png" alt="defect">
                <div style="font-weight:700; font-size:0.8rem;">Defect Detection</div>
            </div>
        </div>
    </div>

    <!-- Middle Hub: Options -->
    <div id="middle-hub" class="nav-view hidden">
        <div class="hub-title" id="middleHubTitle">Menu</div>
        <div class="list-container">
            <div class="list-btn" id="brandsBtn" onclick="openBrands(activeFruit)">Brands</div>
            <div class="list-btn" style="opacity:0.3;">Defects (Soon)</div>
        </div>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass); color:white;" onclick="showHub()">← Back</button>
    </div>

    <!-- Brand Selection -->
    <div id="brand-hub" class="nav-view hidden">
        <div class="hub-title" id="brandHubTitle">Select Brand</div>
        <div id="brandGrid" class="list-container"></div>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass); color:white;" onclick="switchView('middle-hub')">← Back</button>
    </div>

    <!-- Main Calculator App -->
    <div class="app-container" id="appInterface">
        <div class="app-card">
            <img src="edited-image.png" style="width:50px; margin-bottom:10px;">
            <div id="brandName" style="font-size: 1.4rem; font-weight: 900; color: var(--pulp-lime);">BRAND</div>
            <div style="font-weight: 900; letter-spacing: 4px; opacity: 0.5; font-size: 0.7rem; margin-bottom: 25px;">BANANA AGE CHECKER</div>
            
            <div class="input-wrapper">
                <input type="text" id="codeIn" placeholder="---" maxlength="3">
            </div>
            
            <button onclick="checkFruit()" class="btn-main">Calculate</button>
            
            <div id="resBox" class="result-display hidden">
                <div style="font-weight:900; font-size:0.8rem; opacity:0.6;">ESTIMATED DAYS</div>
                <div id="daysValue">--</div>
            </div>
            
            <button class="btn-main" style="margin-top:25px; background:transparent; border:none; opacity:0.4; font-size:0.6rem; color:white;" onclick="switchView('brand-hub')">← Change Brand</button>
        </div>
    </div>

    <script src="js/master-logic.js"></script>
    <script src="js/additions.js"></script>
</body>
</html>
