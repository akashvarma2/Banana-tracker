<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro - Tracking Hub</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --glass-card: rgba(255, 255, 255, 0.03);
            --pulp-lime: #d4ff00;
            --pulp-amber: #ffcc00;
            --pulp-red: #ff4d4d;
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-black); color: white; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }

        /* Typography */
        h1 { font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; color: var(--pulp-lime); }
        .subtitle { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; margin-bottom: 30px; }

        /* Main Buttons */
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .list-btn { 
            background: var(--glass-card); border: 1px solid var(--border-glass); 
            padding: 20px; border-radius: 25px; cursor: pointer; transition: 0.2s;
            font-weight: 800; font-size: 0.9rem;
        }
        .list-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .list-btn.active { border-color: var(--pulp-lime); color: var(--pulp-lime); }

        /* Scanner Overlay & Modal */
        .hidden { display: none !important; }
        .nav-view { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-main {
            background: var(--pulp-lime); color: black; border: none; padding: 18px 40px;
            border-radius: 50px; font-weight: 900; font-size: 1rem; width: 100%; margin-top: 20px;
        }

        .info-block { text-align: left; margin-bottom: 15px; }

        /* Defect Alert */
        #defect-alert {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--pulp-red); color: white;
            padding: 20px; border-radius: 25px; box-shadow: var(--shadow); z-index: 9999;
        }
    </style>
</head>
<body>

    <h1>PULP PRO</h1>
    <div class="subtitle">TRACKING & INFORMATION HUB</div>

    <!-- COMMODITY SELECTOR -->
    <div class="hub-grid" id="fruit-selector">
        <div class="list-btn active" onclick="setFruit('banana', this)">BANANA</div>
        <div class="list-btn" onclick="setFruit('mango', this)">MANGO</div>
        <div class="list-btn" onclick="setFruit('avocado', this)">AVOCADO</div>
        <div class="list-btn" onclick="startDefectScan()" style="background: var(--pulp-red); color: black; border: none;">DEFECTS</div>
    </div>

    <hr style="opacity:0.1; margin: 30px 0;">

    <!-- BRAND SELECTOR -->
    <div id="brand-container">
        <h3 style="font-size: 0.8rem; opacity: 0.5;">SELECT BRAND</h3>
        <div class="hub-grid" id="brand-grid">
            <div class="list-btn" onclick="setBrand('chiquita', this)">CHIQUITA</div>
            <div class="list-btn" onclick="setBrand('fyffes', this)">FYFFES</div>
            <div class="list-btn" onclick="setBrand('dole', this)">DOLE</div>
        </div>
    </div>

    <!-- CODE INPUT AREA -->
    <div id="logic-area" style="margin-top: 30px;">
        <input type="text" id="fruitCode" placeholder="ENTER BRAND CODE" 
               style="background:transparent; border:none; border-bottom: 2px solid var(--pulp-lime); 
                      color:white; font-size:1.5rem; text-align:center; width: 80%; padding: 10px; font-weight: 900;">
        <button class="btn-main" onclick="checkFruit()">CHECK AGE</button>
    </div>

    <!-- RESULT VIEW -->
    <div id="result-view" class="hidden nav-view" style="margin-top: 40px; background: var(--glass-card); padding: 30px; border-radius: 30px; border: 1px solid var(--border-glass);">
        <div id="result-text" style="font-size: 2rem; font-weight: 900; color: var(--pulp-lime);">01 JAN</div>
        <div style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px;">HARVEST/PACK DATE</div>
        <button class="btn-main" style="background:transparent; color:white; border: 1px solid rgba(255,255,255,0.2); margin-top:30px;" onclick="resetApp()">SCAN ANOTHER</button>
    </div>

    <!-- DEFECT INFORMATION MODAL -->
    <div id="defect-modal" class="hidden nav-view" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-black); z-index:10000; overflow-y:auto; padding:20px;">
        <div style="max-width:500px; margin:0 auto;">
            <h2 id="modal-defect-name" style="font-weight:900; color:var(--pulp-lime); text-transform:uppercase; letter-spacing:2px; margin-top:40px;"></h2>
            <div id="modal-severity" style="display:inline-block; padding:5px 15px; border-radius:50px; font-size:0.7rem; font-weight:900; margin-bottom:20px; background:rgba(255,77,77,0.2); color:var(--pulp-red);"></div>
            
            <div class="info-block" style="background:var(--glass-card); padding:20px; border-radius:25px; border:1px solid var(--border-glass); margin-bottom:20px;">
                <h5 style="color:var(--pulp-amber); font-size:0.8rem; font-weight:900; margin-top:0;">CAUSE:</h5>
                <p id="modal-cause" style="font-size:0.9rem; opacity:0.8;"></p>
                
                <h5 style="color:var(--pulp-amber); font-size:0.8rem; font-weight:900; margin-top:20px;">SYMPTOMS:</h5>
                <p id="modal-symptoms" style="font-size:0.9rem; opacity:0.8;"></p>
            </div>

            <div id="photo-comparison" style="margin-bottom:20px; text-align: left;">
                <h5 style="color:var(--pulp-lime); font-size:0.8rem; font-weight:900;">REFERENCE EXAMPLES:</h5>
                <div id="photo-gallery" style="display:flex; gap:10px; overflow-x:auto; padding:10px 0;">
                    <!-- Photos Load Here -->
                </div>
            </div>

            <button class="btn-main" onclick="closeDefectModal()">BACK TO HUB</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">

    <script>
        let currentFruit = 'banana';
        let currentBrand = '';

        // Industry Database
        const defectData = {
            "mango": [
                { "id": "sapburn", "name": "Sapburn", "severity_levels": ["Low", "Medium", "High"], "cause": "Chemical injury from sap leaking from the stem.", "symptoms": "Dark-brown streaks starting from the stem end.", "photos": 2 },
                { "id": "anthracnose", "name": "Anthracnose", "severity_levels": ["Minor", "Major"], "cause": "Fungal infection developing as fruit ripens.", "symptoms": "Irregular black spots that merge into sunken lesions.", "photos": 2 }
            ],
            "banana": [
                { "id": "bruising", "name": "Mechanical Bruising", "severity_levels": ["Slight", "Severe"], "cause": "Impact during transport or handling.", "symptoms": "Sunken, dark areas of the peel; soft to touch.", "photos": 2 },
                { "id": "crown_rot", "name": "Crown Rot", "severity_levels": ["Major"], "cause": "Fungal infection on the cut surface.", "symptoms": "White/grey mold growth on the crown.", "photos": 2 }
            ],
            "avocado": [
                { "id": "chilling_injury", "name": "Chilling Injury", "severity_levels": ["Mild", "Severe"], "cause": "Storage below 5°C (41°F).", "symptoms": "Greyish-brown skin 'scald' and internal browning.", "photos": 2 }
            ]
        };

        function setFruit(fruit, el) {
            currentFruit = fruit;
            document.querySelectorAll('#fruit-selector .list-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setBrand(brand, el) {
            currentBrand = brand;
            document.querySelectorAll('#brand-grid .list-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function checkFruit() {
            // Placeholder for the Master Code math logic
            const code = document.getElementById('fruitCode').value;
            if(!code) return alert("Please enter a code");
            
            document.getElementById('brand-container').classList.add('hidden');
            document.getElementById('logic-area').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('result-text').innerText = "14 APR"; // Example
        }

        function startDefectScan() {
            const choice = confirm("OK: Camera\nCANCEL: Upload from Album");
            if (choice) {
                const cam = document.createElement('input');
                cam.type = 'file'; cam.accept = 'image/*'; cam.capture = 'environment';
                cam.onchange = (e) => handleFileUpload(e);
                cam.click();
            } else {
                document.getElementById('fileInput').click();
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Simulate Detection for current fruit
            const randomDefect = defectData[currentFruit][0];
            showDetectionAlert(randomDefect.id, currentFruit);
        }

        function showDetectionAlert(defectId, fruit) {
            const alertDiv = document.createElement('div');
            alertDiv.id = "defect-alert";
            alertDiv.innerHTML = `
                <div style="font-weight:900; font-size:1.1rem; letter-spacing:1px;">${defectId.toUpperCase()} DETECTED</div>
                <button onclick="openDefectModal('${defectId}', '${fruit}')" style="background:white; color:black; border:none; padding:10px 20px; border-radius:15px; margin-top:15px; font-weight:900; width:100%;">MORE INFORMATION</button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 8000);
        }

        function openDefectModal(id, fruit) {
            const data = defectData[fruit].find(d => d.id === id);
            document.getElementById('modal-defect-name').innerText = data.name;
            document.getElementById('modal-cause').innerText = data.cause;
            document.getElementById('modal-symptoms').innerText = data.symptoms;
            document.getElementById('modal-severity').innerText = `SEVERITY: ${data.severity_levels.join(' / ')}`;
            
            const gallery = document.getElementById('photo-gallery');
            gallery.innerHTML = `
                <div style="min-width:180px; height:180px; background:#1a1a1a; border-radius:20px; border:1px dashed #444; display:flex; align-items:center; justify-content:center; color:#666; font-size:0.7rem;">[PHOTO: ${data.name} STAGE 1]</div>
                <div style="min-width:180px; height:180px; background:#1a1a1a; border-radius:20px; border:1px dashed #444; display:flex; align-items:center; justify-content:center; color:#666; font-size:0.7rem;">[PHOTO: ${data.name} STAGE 2]</div>
            `;

            document.getElementById('defect-modal').classList.remove('hidden');
        }

        function closeDefectModal() {
            document.getElementById('defect-modal').classList.add('hidden');
            if(document.getElementById('defect-alert')) document.getElementById('defect-alert').remove();
        }

        function resetApp() {
            location.reload();
        }
    </script>
</body>
</html>
