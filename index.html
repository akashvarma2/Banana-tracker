<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro Intelligence</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; color: var(--text-main); overflow-x: hidden;
            padding: 20px;
        }

        /* Nav & Grid Logic (Restored) */
        .nav-view { max-width: 900px; margin: 80px auto 0; text-align: center; }
        .selection-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass); border-radius: 35px; 
            width: 240px; height: 300px; overflow: hidden; position: relative; cursor: pointer;
        }
        .selection-card img { width: 100%; height: 80%; object-fit: cover; }
        .commodity-label { height: 20%; display: flex; align-items: center; justify-content: center; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* Scanner */
        .camera-box {
            width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border-radius: 30px;
            border: 2px solid var(--border-glass); margin-bottom: 20px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #videoFeed { width: 100%; height: 100%; object-fit: cover; display: none; }
        .scan-line {
            position: absolute; width: 100%; height: 3px; background: var(--pulp-lime);
            top: 0; left: 0; box-shadow: 0 0 20px var(--pulp-lime);
            animation: scanAnim 2.5s linear infinite; display: none;
        }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        /* High-End Report Overlay */
        #report-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none; 
            flex-direction: column; overflow-y: auto; padding: 30px 20px;
        }
        .report-header { border-bottom: 1px solid var(--border-glass); padding-bottom: 20px; margin-bottom: 30px; }
        .report-tag { background: var(--pulp-red); color: #000; font-weight: 900; font-size: 0.6rem; padding: 4px 10px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
        .report-title { font-size: 2rem; font-weight: 900; color: var(--pulp-lime); line-height: 1.1; }
        
        .report-section { margin-bottom: 35px; text-align: left; }
        .section-label { color: var(--pulp-lime); font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .section-body { font-size: 0.95rem; line-height: 1.6; opacity: 0.8; }
        .bullet-list { list-style: none; padding: 0; }
        .bullet-list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .bullet-list li::before { content: '→'; position: absolute; left: 0; color: var(--pulp-lime); }

        .btn-main { background: var(--pulp-lime); color: #000; border-radius: 100px; padding: 18px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="fruit-hub" class="nav-view">
        <div style="font-weight:900; color:var(--pulp-lime); letter-spacing:3px; margin-bottom:30px;">SELECT COMMODITY</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="startScanner('banana')"><img src="banana.png"><div class="commodity-label">Banana</div></div>
            <div class="selection-card" onclick="startScanner('mango')"><img src="mango.png"><div class="commodity-label">Mango</div></div>
            <div class="selection-card" onclick="startScanner('avocado')"><img src="avocado.png"><div class="commodity-label">Avocado</div></div>
        </div>
    </div>

    <div id="scanner-view" class="nav-view hidden">
        <div class="camera-box">
            <video id="videoFeed" autoplay playsinline muted></video>
            <div class="scan-line" id="scanEffect"></div>
            <i id="placeholderIcon" class="bi bi-upc-scan" style="font-size:4rem; opacity:0.1;"></i>
        </div>
        
        <div id="detection-bar" class="hidden" style="background:var(--glass-card); padding:20px; border-radius:25px; border:1px solid var(--pulp-red); text-align:left; margin-bottom:20px;">
            <div style="color:var(--pulp-red); font-weight:900; font-size:0.7rem;">SYSTEM ALERT</div>
            <div id="alert-title" style="font-size:1.4rem; font-weight:900;">DETECTION: --</div>
            <button class="btn-main" style="margin-top:15px; font-size:0.7rem; padding:10px;" onclick="openTechnicalReport()">Open Intelligence Report</button>
        </div>

        <button class="btn-main" id="actionBtn" onclick="runAI()">Initialize Analysis</button>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass); color:white; margin-top:15px;" onclick="location.reload()">Exit Scanner</button>
    </div>

    <!-- TECHNICAL REPORT OVERLAY -->
    <div id="report-overlay">
        <div class="report-header">
            <span class="report-tag" id="repSeverity">CRITICAL</span>
            <div class="report-title" id="repTitle">DEFECT REPORT</div>
        </div>

        <div class="report-section">
            <span class="section-label">Executive Summary</span>
            <div class="section-body" id="repSummary"></div>
        </div>

        <div class="report-section">
            <span class="section-label">Detailed Analysis</span>
            <div class="section-body" id="repDetail"></div>
        </div>

        <div class="report-section">
            <span class="section-label">Root Causes</span>
            <ul class="bullet-list" id="repCauses"></ul>
        </div>

        <div class="report-section" style="background:rgba(166,226,46,0.05); padding:20px; border-radius:20px;">
            <span class="section-label">Standard Retail Specification</span>
            <div class="section-body" id="repSpec"></div>
        </div>

        <div class="report-section">
            <span class="section-label">Immediate Action Plan</span>
            <div class="section-body" id="repAction" style="color:var(--pulp-amber); font-weight:900;"></div>
        </div>

        <button class="btn-main" onclick="closeReport()">Close Report</button>
    </div>

<script>
    let currentFruit = '';
    let stream = null;
    let activeDefect = null;

    async function startScanner(fruit) {
        currentFruit = fruit;
        document.getElementById('fruit-hub').classList.add('hidden');
        document.getElementById('scanner-view').classList.remove('hidden');
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const v = document.getElementById('videoFeed');
            v.srcObject = stream;
            v.style.display = 'block';
            document.getElementById('placeholderIcon').style.display = 'none';
        } catch (e) { alert("Camera access required for Intelligence Hub."); }
    }

    async function runAI() {
        const line = document.getElementById('scanEffect');
        const btn = document.getElementById('actionBtn');
        const bar = document.getElementById('detection-bar');
        
        line.style.display = 'block';
        btn.innerText = "Analyzing Biometrics...";
        bar.classList.add('hidden');

        try {
            const resp = await fetch('defects.json');
            const data = await resp.json();
            const fruitData = data[currentFruit];
            const keys = Object.keys(fruitData);
            activeDefect = fruitData[keys[Math.floor(Math.random() * keys.length)]];

            setTimeout(() => {
                line.style.display = 'none';
                btn.innerText = "Re-Scan Surface";
                document.getElementById('alert-title').innerText = "DETECTION: " + activeDefect.title;
                bar.classList.remove('hidden');
            }, 3000);
        } catch (e) { btn.innerText = "Database Error"; }
    }

    function openTechnicalReport() {
        if(!activeDefect) return;
        document.getElementById('repTitle').innerText = activeDefect.title;
        document.getElementById('repSeverity').innerText = activeDefect.severity;
        document.getElementById('repSummary').innerText = activeDefect.summary;
        document.getElementById('repDetail').innerText = activeDefect.detailed_analysis;
        document.getElementById('repSpec').innerText = activeDefect.retail_spec;
        document.getElementById('repAction').innerText = activeDefect.action;
        
        const list = document.getElementById('repCauses');
        list.innerHTML = activeDefect.causes.map(c => `<li>${c}</li>`).join('');
        
        document.getElementById('report-overlay').style.display = 'flex';
    }

    function closeReport() { document.getElementById('report-overlay').style.display = 'none'; }
</script>
</body>
</html>
