<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body.light-theme {
            --bg-black: #f8f9fa;
            --drawer-bg: #ffffff;
            --glass-card: #ffffff;
            --text-main: #121212;
            --text-dim: #4a4a4a;
            --border-glass: rgba(0, 0, 0, 0.08);
            --input-bg: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        .splash-logo { width: auto; height: auto; max-width: 80%; max-height: 40vh; object-fit: contain; animation: heroFade 2.6s ease-in-out forwards; }
        .splash-text { margin-top: 20px; font-size: 2rem; font-weight: 900; letter-spacing: 6px; color: var(--pulp-lime); text-transform: uppercase; text-shadow: 0 0 15px rgba(166, 226, 46, 0.5); opacity: 0; animation: textFade 2.6s ease-in-out forwards; }

        @keyframes heroFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(15px); }
            35% { transform: scale(1); opacity: 1; filter: blur(0px); }
            75% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
        }
        @keyframes textFade {
            0% { transform: translateY(10px); opacity: 0; }
            35% { transform: translateY(0); opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        #menu-trigger {
            position: fixed; top: 20px; left: 20px; width: 44px; height: 44px;
            background: var(--input-bg); border-radius: 12px; z-index: 9900;
            display: flex; align-items: center; justify-content: center; opacity: 0;
            transition: all 0.5s ease 2.6s;
            border: 1px solid var(--border-glass);
        }
        .loaded #menu-trigger { opacity: 1; }
        #menu-trigger span, #menu-trigger span::before, #menu-trigger span::after { content: ''; display: block; width: 20px; height: 2px; background: var(--text-main); position: absolute; }
        #menu-trigger span::before { top: -6px; }
        #menu-trigger span::after { bottom: -6px; }

        #menu-drawer {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: var(--drawer-bg); z-index: 9995;
            box-shadow: 20px 0 60px rgba(0,0,0,0.1);
            transition: left 0.4s cubic-bezier(0.15, 1, 0.3, 1);
            padding: 30px 20px; display: flex; flex-direction: column;
            backdrop-filter: blur(20px); border-right: 1px solid var(--border-glass);
        }
        #menu-drawer.open { left: 0; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9994; display: none; }
        #menu-overlay.open { display: block; }
        
        .nav-view { max-width: 900px; width: 100%; text-align: center; opacity: 0; transition: 0.5s; margin-top: 80px; }
        .loaded .nav-view { opacity: 1; }
        .hub-title { font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; color: var(--pulp-lime); }
        
        .selection-grid-container { width: 100%; overflow: visible; padding-bottom: 40px; }
        .selection-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; width: 100%; }
        @media (min-width: 768px) { .selection-grid { flex-direction: row; justify-content: center; flex-wrap: wrap; } }

        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass); border-radius: 45px; 
            cursor: pointer; transition: 0.3s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-end; width: 260px; height: 320px; 
            overflow: hidden; position: relative; flex-shrink: 0; box-shadow: var(--shadow);
        }
        .selection-card:hover { border-color: var(--pulp-lime); transform: translateY(-5px); }
        .selection-card img { position: absolute; top: 0; left: 0; width: 100%; height: 80%; object-fit: cover; border-radius: 43px 43px 0 0; }
        .commodity-name-section { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass-card); z-index: 2; padding-bottom: 15px; }
        .commodity-name-section span { display: block; font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); }

        /* DEFECT HUB CAMERA STYLES */
        .defect-camera-container {
            width: 100%; aspect-ratio: 1/1; background: #111; border-radius: 30px;
            border: 2px solid var(--border-glass); margin-bottom: 20px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #defectVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        .defect-scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--pulp-lime);
            top: 0; left: 0; box-shadow: 0 0 15px var(--pulp-lime);
            animation: scanAnim 3s linear infinite; display: none; z-index: 10;
        }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        .list-container { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .list-btn {
            background: var(--glass-card); border: 1px solid var(--border-glass); padding: 22px; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; 
            font-size: 0.9rem; color: var(--text-main); text-align: center; box-shadow: var(--shadow);
        }
        .list-btn:hover:not(.disabled) { border-color: var(--pulp-lime); background: rgba(166, 226, 46, 0.05); color: var(--pulp-lime); }
        .list-btn.disabled { opacity: 0.4; cursor: default; }

        .app-container { display: none; flex-direction: column; gap: 30px; width: 100%; max-width: 400px; margin-top: 40px; }
        .app-card { background: var(--glass-card); padding: 2.5rem 1.5rem; border-radius: 50px; text-align: center; border: 1px solid var(--border-glass); position: relative; box-shadow: var(--shadow); }
        .input-wrapper { background: var(--input-bg); border: 2px solid rgba(166, 226, 46, 0.2); border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        input { border: none !important; text-align: center; letter-spacing: 8px; font-weight: 900; font-size: 3rem !important; background: transparent !important; color: var(--text-main); width: 100%; outline: none; text-transform: uppercase; }
        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 15px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; cursor: pointer; }
        
        .result-display { margin-top: 25px; padding: 25px 20px; border-radius: 35px; background: var(--input-bg); border: 1px solid var(--border-glass); position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo">
        <div class="splash-text">PULP PRO</div>
    </div>

    <div id="menu-trigger" onclick="toggleMenu()"><span></span></div>

    <div id="fruit-hub" class="nav-view">
        <div class="hub-title">Select Commodity</div>
        <div class="selection-grid-container">
            <div class="selection-grid">
                <div class="selection-card" onclick="openMiddleHub('banana')"><img src="banana.png" alt="banana"><div class="commodity-name-section"><span>Banana</span></div></div>
                <div class="selection-card" onclick="openMiddleHub('mango')"><img src="mango.png" alt="mango"><div class="commodity-name-section"><span>Mango</span><span style="color:var(--pulp-amber); font-size:0.6rem; letter-spacing:1px;">(SOON)</span></div></div>
                <div class="selection-card" onclick="openMiddleHub('avocado')"><img src="avocado.png" alt="avocado"><div class="commodity-name-section"><span>Avocado</span><span style="color:var(--pulp-amber); font-size:0.6rem; letter-spacing:1px;">(SOON)</span></div></div>
                <div class="selection-card" onclick="switchView('defect-hub')">
                    <img src="rotten.png" alt="Defect Hub">
                    <div class="commodity-name-section"><span style="color:var(--pulp-amber);">Defect Hub</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="defect-hub" class="nav-view hidden">
        <div class="hub-title">Defect Analysis</div>
        <div class="list-container" id="defect-initial-list">
            <div class="list-btn" onclick="startDefectScan('banana')">Scan Banana</div>
            <div class="list-btn" onclick="startDefectScan('mango')">Scan Mango</div>
            <div class="list-btn" onclick="startDefectScan('avocado')">Scan Avocado</div>
        </div>

        <div id="defect-scanner-ui" class="hidden" style="max-width:400px; margin: 0 auto;">
            <div class="defect-camera-container">
                <video id="defectVideo" autoplay playsinline muted></video>
                <div class="defect-scan-line" id="scanLine"></div>
                <i id="camPlaceholderIcon" class="bi bi-camera" style="font-size:3rem; opacity:0.2;"></i>
            </div>
            <p id="scanStatus" style="font-weight:900; font-size:0.8rem; color:var(--pulp-lime); margin-bottom:15px;">CAMERA READY</p>
            <div id="defect-results" class="hidden" style="text-align:left; background:var(--input-bg); padding:20px; border-radius:20px; border:1px solid var(--border-glass); margin-bottom:20px;"></div>
            <button class="btn-main" id="scanTriggerBtn" onclick="runAiAnalysis()">Run AI Analysis</button>
            <button class="btn-main" style="margin-top:10px; background:transparent; border:1px solid var(--border-glass); color:var(--text-main);" onclick="stopCamera(); resetDefectHub();">Cancel</button>
        </div>
        <button class="btn-main" style="margin-top:40px; background:transparent; border:none; opacity:0.4; font-size:0.7rem; color:var(--text-main);" onclick="showHub()">← Back</button>
    </div>

    <div id="middle-hub" class="nav-view hidden">
        <div class="hub-title" id="middleHubTitle">Menu</div>
        <div class="list-container">
            <div class="list-btn" id="brandsBtn" onclick="openBrands(activeFruit)">Brands</div>
            <div class="list-btn disabled">Defects (Soon)</div>
        </div>
        <button class="btn-main" style="margin-top:40px; background:transparent; border:1px solid var(--border-glass);" onclick="showHub()">← Back</button>
    </div>

    <div id="brand-hub" class="nav-view hidden">
        <div class="hub-title">Select Brand</div>
        <div id="brandGrid" class="list-container"></div>
        <button class="btn-main" style="margin-top:40px; background:transparent; border:1px solid var(--border-glass);" onclick="openMiddleHub(activeFruit)">← Back</button>
    </div>

    <div class="app-container" id="appInterface">
        <div class="app-card">
            <div id="brandName" style="font-size: 1.4rem; font-weight: 900; color: var(--pulp-lime); text-transform: uppercase;">--</div>
            <div id="commodityLabel" style="font-weight: 900; letter-spacing: 4px; opacity: 0.5; font-size: 0.7rem; margin-bottom: 25px;">AGE CHECKER</div>
            <div class="input-wrapper"><input type="text" id="codeIn" placeholder="---" maxlength="3" autofocus></div>
            <button onclick="checkFruit()" class="btn-main">Calculate</button>
            <div id="resBox" class="result-display hidden">
                <div id="statusLabel" style="font-weight:900;">--</div>
                <div id="daysValue" style="font-size: 5rem; font-weight: 900;">--</div>
                <div id="dateText" style="font-size: 1.3rem; font-weight: 900;">--</div>
            </div>
            <button class="btn-main" style="margin-top:25px; background:transparent; border:none; opacity:0.4; font-size:0.6rem;" onclick="openBrands(activeFruit)">← Back to Brands</button>
        </div>
    </div>

<script>
    let activeFruit = '';
    let videoStream = null;

    window.addEventListener('load', () => {
        setTimeout(() => document.body.classList.add('loaded'), 2600);
    });

    function switchView(targetId) {
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('appInterface').style.display = 'none';
        if(targetId === 'appInterface') document.getElementById('appInterface').style.display = 'flex';
        else document.getElementById(targetId).classList.remove('hidden');
    }

    function showHub() { switchView('fruit-hub'); }
    function openMiddleHub(fruit) { activeFruit = fruit; switchView('middle-hub'); document.getElementById('middleHubTitle').innerText = fruit.toUpperCase() + " MENU"; }
    
    function openBrands(fruit) {
        switchView('brand-hub');
        const grid = document.getElementById('brandGrid');
        if(fruit === 'banana') grid.innerHTML = `<div class="list-btn" onclick="openCalc('Chiquita')">Chiquita</div>`;
        else grid.innerHTML = `<div style="opacity:0.5;">No brands for ${fruit} yet.</div>`;
    }

    function openCalc(brand) { switchView('appInterface'); document.getElementById('brandName').innerText = brand; document.getElementById('commodityLabel').innerText = activeFruit.toUpperCase() + " AGE CHECKER"; }

    async function startDefectScan(commodity) {
        activeFruit = commodity;
        document.getElementById('defect-initial-list').classList.add('hidden');
        document.getElementById('defect-scanner-ui').classList.remove('hidden');
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('defectVideo');
            video.srcObject = videoStream;
            video.style.display = 'block';
            document.getElementById('camPlaceholderIcon').style.display = 'none';
        } catch (e) { alert("Camera error: Ensure HTTPS is used."); resetDefectHub(); }
    }

    async function runAiAnalysis() {
        const line = document.getElementById('scanLine');
        const status = document.getElementById('scanStatus');
        const results = document.getElementById('defect-results');
        line.style.display = 'block'; status.innerText = "ANALYZING...";

        try {
            const resp = await fetch('defects.json');
            const data = await resp.json();
            // Simulate random selection for demo; high-end logic will target keys specifically
            const keys = Object.keys(data[activeFruit].external || data[activeFruit]);
            const d = (data[activeFruit].external || data[activeFruit])[keys[0]];

            setTimeout(() => {
                line.style.display = 'none'; status.innerText = "COMPLETE";
                results.innerHTML = `<div style="font-weight:900; color:var(--pulp-red);">${d.title}</div><p style="font-size:0.7rem; margin-top:5px;">${d.description}</p><div style="font-size:0.6rem; color:var(--pulp-lime);">SPEC: ${d.retail_spec}</div>`;
                results.classList.remove('hidden');
            }, 3000);
        } catch (e) { status.innerText = "DATABASE ERROR"; }
    }

    function stopCamera() { if (videoStream) videoStream.getTracks().forEach(t => t.stop()); }
    function resetDefectHub() { document.getElementById('defect-initial-list').classList.remove('hidden'); document.getElementById('defect-scanner-ui').classList.add('hidden'); document.getElementById('defect-results').classList.add('hidden'); }
    function toggleMenu() { document.getElementById('menu-drawer')?.classList.toggle('open'); }
    function checkFruit() { /* Existing age logic... */ }
</script>
</body>
</html>
