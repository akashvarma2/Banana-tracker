<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Tracker Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --perfect-green: #28a745;
            --acceptable-orange: #fd7e14;
            --old-red: #dc3545;
            --banana-yellow: #FFE135;
            --card-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root { --banana-yellow: #1a1a1a; --card-bg: #2d2d2d; }
        }

        body { 
            background-color: var(--banana-yellow);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }

        .app-card {
            background: var(--card-bg);
            padding: 2.5rem 1.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 92%; max-width: 360px;
            text-align: center; border: 3px solid #333;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The Visual Shake for iPhone Errors */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .input-wrapper {
            background: rgba(0,0,0,0.05); border: 2px solid #333;
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
        }

        input {
            border: none !important; text-align: center; letter-spacing: 8px;
            font-weight: 900; font-size: 2.8rem !important; background: transparent !important;
            color: inherit; width: 100%; outline: none; text-transform: uppercase;
        }

        .result-display {
            margin-top: 25px; padding: 20px; border-radius: 30px;
            background: rgba(0,0,0,0.04); transition: all 0.4s ease;
        }

        #daysValue { font-size: 5rem; font-weight: 900; line-height: 1; }
        
        .bg-perfect { background-color: var(--perfect-green) !important; color: white !important; }
        .bg-old { background-color: var(--old-red) !important; color: white !important; }
        .bg-error { background-color: #6c757d !important; color: white !important; }

        .btn-main {
            background: #333; color: #fff; border-radius: 50px;
            padding: 16px; font-weight: 800; width: 100%; border: none;
            box-shadow: 0 4px 0 #000;
        }
    </style>
</head>
<body>

<div class="app-card" id="appCard">
    <div style="font-size: 3rem;">🍌</div>
    <h2 style="font-weight:900;">Age Tracker</h2>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="ABC" maxlength="3" 
               inputmode="text" autocapitalize="characters" autofocus autocomplete="off">
    </div>
    
    <button onclick="checkBanana()" class="btn-main">CALCULATE</button>

    <div id="resBox" class="result-display">
        <div id="statusLabel" style="font-weight:800; text-transform:uppercase;">Ready</div>
        <div id="daysValue">--</div>
        <div style="font-size: 0.75rem; font-weight:800;">DAYS FROM HARVEST</div>
        <div id="dateText" style="font-size: 0.9rem; margin-top:10px; opacity:0.8;">-- -- ----</div>
    </div>
</div>

<script>
    const inputField = document.getElementById('codeIn');
    const card = document.getElementById('appCard');

    inputField.addEventListener('input', () => { 
        if (inputField.value.length === 3) checkBanana(); 
    });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;

        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const daysVal = document.getElementById('daysValue');
        const dateTxt = document.getElementById('dateText');

        const mChar = val.charCodeAt(0);
        const dChar = val.charCodeAt(1);
        const yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            triggerFeedback('error');
            box.className = 'result-display bg-error';
            label.innerText = "Invalid Code";
            daysVal.innerText = "ERR";
            return;
        }

        const now = new Date();
        now.setHours(0,0,0,0);
        const m = mChar - 65;
        let d = dChar - 64;
        if (yDigit === '2') d += 26;

        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        box.className = 'result-display';
        daysVal.innerText = diff;
        dateTxt.innerText = hDate.toLocaleDateString();

        if (diff > 31) {
            triggerFeedback('error');
            label.innerText = "Too Old";
            box.classList.add('bg-old');
        } else if (diff <= 21) {
            triggerFeedback('success');
            label.innerText = "Perfect";
            box.classList.add('bg-perfect');
        } else {
            label.innerText = "Acceptable";
            box.style.backgroundColor = "var(--acceptable-orange)";
            box.style.color = "white";
        }
    }

    function triggerFeedback(type) {
        // iPhone Visual Feedback
        card.classList.remove('shake');
        void card.offsetWidth; // Trigger reflow
        
        if (type === 'error') {
            card.classList.add('shake'); // Visual shake for iPhone
        }
        
        // Android/Future-proof Vibration
        if ("vibrate" in navigator) {
            navigator.vibrate(type === 'error' ? [200, 100, 200] : 40);
        }
    }
</script>
</body>
</html>
