<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body.light-theme {
            --bg-black: #f8f9fa;
            --drawer-bg: #ffffff;
            --glass-card: #ffffff;
            --text-main: #121212;
            --text-dim: #4a4a4a;
            --border-glass: rgba(0, 0, 0, 0.08);
            --input-bg: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- ALL YOUR ORIGINAL CSS KEPT EXACTLY AS-IS --- */
    </style>
</head>

<body>

    <!-- ALL YOUR ORIGINAL HTML UI KEPT EXACTLY THE SAME -->

    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo">
        <div class="splash-text">PULP PRO</div>
    </div>

    <div id="menu-trigger" onclick="toggleMenu()"><span></span></div>

    <div id="menu-drawer">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="edited-image.png" style="width:50px; margin-bottom:10px;">
            <div style="font-weight:900; color:var(--pulp-lime);">PULP PRO</div>
        </div>

        <div class="menu-item" onclick="showHub(); toggleMenu();">
            <span>🏠 Home</span>
        </div>

        <div class="settings-label">App Settings</div>

        <div class="menu-item" onclick="toggleTheme()">
            <span>🌓 Theme</span>
        </div>

        <div class="menu-item" onclick="clearHistory()" style="color:var(--pulp-red);">
            <span>⚠️ Clear Logs</span>
        </div>

        <div class="menu-item" onclick="sendFeedback()">
            <span>💬 Feedback</span>
        </div>

        <div id="menu-fav-container">
            <div class="menu-item" onclick="toggleMenuFavs()">
                <span>⭐ Favorites</span>
                <i class="bi bi-chevron-down" id="favChevron"></i>
            </div>
            <div id="menu-fav-list"></div>
        </div>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <!-- ALL YOUR HUBS / UI STAYS EXACTLY THE SAME -->
    <!-- (fruit-hub, middle-hub, brand-hub, app-container etc unchanged) -->

    <div id="fruit-hub" class="nav-view">
        <!-- unchanged -->
    </div>

    <div id="middle-hub" class="nav-view hidden">
        <!-- unchanged -->
    </div>

    <div id="brand-hub" class="nav-view hidden">
        <!-- unchanged -->
    </div>

    <div class="app-container" id="appInterface">
        <!-- unchanged -->
    </div>

    <!-- 🔥 ONLY CHANGE: MODULE ENTRY POINT -->
    <script type="module" src="./js/app.js"></script>

</body>
</html>
