<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden;
            padding: 20px; transition: background-color 0.3s ease;
        }

        /* Splash Screen Logic */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        .splash-logo { width: auto; height: auto; max-width: 80%; max-height: 40vh; object-fit: contain; animation: heroFade 2.6s ease-in-out forwards; }
        .splash-text { margin-top: 20px; font-size: 2rem; font-weight: 900; letter-spacing: 6px; color: var(--pulp-lime); text-transform: uppercase; text-shadow: 0 0 15px rgba(166, 226, 46, 0.5); opacity: 0; animation: textFade 2.6s ease-in-out forwards; }

        @keyframes heroFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(15px); }
            35% { transform: scale(1); opacity: 1; filter: blur(0px); }
            75% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
        }
        @keyframes textFade {
            0% { transform: translateY(10px); opacity: 0; }
            35% { transform: translateY(0); opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        /* Navigation Views */
        .nav-view { max-width: 900px; width: 100%; text-align: center; opacity: 0; transition: 0.5s; margin-top: 80px; }
        .loaded .nav-view { opacity: 1; }
        .hub-title { font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; color: var(--pulp-lime); }
        
        .selection-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; width: 100%; }
        @media (min-width: 768px) { .selection-grid { flex-direction: row; justify-content: center; flex-wrap: wrap; } }

        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass); border-radius: 45px; 
            cursor: pointer; transition: 0.3s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-end; width: 260px; height: 320px; 
            overflow: hidden; position: relative; box-shadow: var(--shadow);
        }
        .selection-card img { position: absolute; top: 0; left: 0; width: 100%; height: 80%; object-fit: cover; }
        .commodity-name-section { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass-card); z-index: 2; padding-bottom: 15px; }
        .commodity-name-section span { font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Scanner Specifics */
        .defect-camera-container {
            width: 100%; aspect-ratio: 1/1; background: #111; border-radius: 30px;
            border: 2px solid var(--border-glass); margin-bottom: 20px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #defectVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        .defect-scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--pulp-lime);
            top: 0; left: 0; box-shadow: 0 0 15px var(--pulp-lime);
            animation: scanAnim 3s linear infinite; display: none; z-index: 10;
        }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        .list-container { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .list-btn { background: var(--glass-card); border: 1px solid var(--border-glass); padding: 22px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-align: center; color: white; }
        
        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 15px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        
        .hidden { display: none !important; }
        .tech-detail-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-top: 10px; text-align: left; border-left: 3px solid var(--pulp-lime); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo">
        <div class="splash-text">PULP PRO</div>
    </div>

    <div id="fruit-hub" class="nav-view">
        <div class="hub-title">Select Commodity</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="openMiddleHub('banana')"><img src="banana.png"> <div class="commodity-name-section"><span>Banana</span></div></div>
            <div class="selection-card" onclick="openMiddleHub('mango')"><img src="mango.png"> <div class="commodity-name-section"><span>Mango</span></div></div>
            <div class="selection-card" onclick="openMiddleHub('avocado')"><img src="avocado.png"> <div class="commodity-name-section"><span>Avocado</span></div></div>
            <div class="selection-card" onclick="switchView('defect-hub')"><img src="rotten.png"> <div class="commodity-name-section"><span style="color:var(--pulp-amber);">Defect Hub</span></div></div>
        </div>
    </div>

    <!-- DEFECT HUB -->
    <div id="defect-hub" class="nav-view hidden">
        <div class="hub-title">Intelligence Scanner</div>
        <div class="list-container" id="defect-initial-list">
            <div class="list-btn" onclick="startDefectScan('banana')">Scan Banana</div>
            <div class="list-btn" onclick="startDefectScan('mango')">Scan Mango</div>
            <div class="list-btn" onclick="startDefectScan('avocado')">Scan Avocado</div>
        </div>

        <div id="scanner-ui" class="hidden" style="max-width:400px; margin: 0 auto;">
            <div class="defect-camera-container">
                <video id="defectVideo" autoplay playsinline muted></video>
                <div class="defect-scan-line" id="scanLine"></div>
                <i id="camIcon" class="bi bi-camera" style="font-size:3rem; opacity:0.2;"></i>
            </div>
            
            <p id="scanStatus" style="font-weight:900; font-size:0.7rem; color:var(--pulp-lime);">SENSOR READY</p>

            <div id="result-box" class="hidden" style="background:var(--glass-card); padding:20px; border-radius:25px; border:1px solid var(--border-glass); margin-bottom:15px; text-align:left;">
                <div id="main-detection" style="font-weight:900; color:var(--pulp-red); font-size:1.1rem;"></div>
                <p id="main-desc" style="font-size:0.75rem; opacity:0.7; margin:5px 0;"></p>
                
                <button id="infoBtn" class="btn-main" style="background:transparent; border:1px solid var(--pulp-lime); font-size:0.6rem; width:auto; padding:5px 15px;" onclick="toggleMoreInfo()">View Technical Details</button>
                
                <div id="extra-info" class="hidden tech-detail-card"></div>
            </div>

            <button class="btn-main" id="scanTrigger" onclick="runAiAnalysis()">Run AI Analysis</button>
            <button class="btn-main" style="background:transparent; border:none; opacity:0.5;" onclick="stopCamera(); showHub();">Cancel</button>
        </div>
    </div>

<script>
    let activeFruit = '';
    let videoStream = null;

    window.addEventListener('load', () => { setTimeout(() => document.body.classList.add('loaded'), 2600); });

    function switchView(id) {
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function showHub() { switchView('fruit-hub'); resetDefectHub(); }

    async function startDefectScan(commodity) {
        activeFruit = commodity;
        document.getElementById('defect-initial-list').classList.add('hidden');
        document.getElementById('scanner-ui').classList.remove('hidden');
        
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('defectVideo');
            video.srcObject = videoStream;
            video.style.display = 'block';
            document.getElementById('camIcon').style.display = 'none';
        } catch (e) { alert("Camera access denied."); showHub(); }
    }

    async function runAiAnalysis() {
        const line = document.getElementById('scanLine');
        const status = document.getElementById('scanStatus');
        const trigger = document.getElementById('scanTrigger');
        const resultBox = document.getElementById('result-box');
        
        // Reset UI for new scan
        resultBox.classList.add('hidden');
        document.getElementById('extra-info').classList.add('hidden');
        line.style.display = 'block';
        status.innerText = "SCANNING SURFACE...";
        trigger.innerText = "PROCESSING...";

        try {
            const resp = await fetch('defects.json');
            const data = await resp.json();
            
            // Get defects for active fruit (support both nested or flat JSON structure)
            const fruitData = data[activeFruit].external || data[activeFruit];
            const keys = Object.keys(fruitData);
            // Dynamic Pick: Choose a random defect from the list
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            const defect = fruitData[randomKey];

            setTimeout(() => {
                line.style.display = 'none';
                status.innerText = "ANALYSIS COMPLETE";
                trigger.innerText = "Re-Scan";
                
                document.getElementById('main-detection').innerText = "DETECTED: " + defect.title.toUpperCase();
                document.getElementById('main-desc').innerText = defect.description;
                
                document.getElementById('extra-info').innerHTML = `
                    <p><strong>RETAIL SPEC:</strong> ${defect.retail_spec}</p>
                    <p><strong>ACTION:</strong> ${defect.action || 'Contact Quality Lead'}</p>
                    <p><strong>CAUSES:</strong> ${defect.causes ? defect.causes.join(", ") : 'N/A'}</p>
                `;
                
                resultBox.classList.remove('hidden');
            }, 3000);
        } catch (err) { status.innerText = "DATABASE ERROR"; }
    }

    function toggleMoreInfo() {
        const info = document.getElementById('extra-info');
        info.classList.toggle('hidden');
        document.getElementById('infoBtn').innerText = info.classList.contains('hidden') ? "View Technical Details" : "Hide Details";
    }

    function stopCamera() { if(videoStream) videoStream.getTracks().forEach(t => t.stop()); }
    function resetDefectHub() {
        document.getElementById('defect-initial-list').classList.remove('hidden');
        document.getElementById('scanner-ui').classList.add('hidden');
        document.getElementById('result-box').classList.add('hidden');
    }
    function openMiddleHub(f) { activeFruit = f; alert(f.toUpperCase() + " module coming soon."); }
</script>
</body>
</html>
