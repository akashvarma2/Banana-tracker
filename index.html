<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Tracker</title>
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#FFE135">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --perfect-green: #28a745;
            --acceptable-orange: #fd7e14;
            --old-red: #dc3545;
            --banana-yellow: #FFE135;
            --error-grey: #6c757d;
        }

        body { 
            background-color: var(--banana-yellow);
            background-image: radial-gradient(#FFEC85 20%, transparent 20%), radial-gradient(#FFEC85 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .app-card {
            background: white;
            padding: 2rem 1.5rem;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 92%;
            max-width: 360px;
            text-align: center;
            border: 3px solid #333;
        }

        h2 { font-weight: 900; color: #333; text-transform: uppercase; margin-bottom: 15px; }

        .input-wrapper {
            background: #f8f9fa;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 15px;
        }

        input {
            border: none !important;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 900;
            font-size: 2.2rem !important;
            background: transparent !important;
            color: #333;
            width: 100%;
        }

        .btn-main {
            background: #333;
            color: white;
            border-radius: 50px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            border: none;
        }

        .result-display {
            margin-top: 15px;
            padding: 20px;
            border-radius: 25px;
            background: #f1f1f1;
            transition: all 0.4s ease;
            color: #333;
        }

        #emojiDisplay { font-size: 3.5rem; display: block; }
        #daysValue { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        
        .status-pill {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: #ddd;
        }

        /* Logic Colors */
        .bg-perfect { background-color: var(--perfect-green) !important; color: white !important; }
        .bg-perfect .status-pill { background: white; color: var(--perfect-green); }

        .bg-acceptable { background-color: var(--acceptable-orange) !important; color: white !important; }
        .bg-acceptable .status-pill { background: white; color: var(--acceptable-orange); }

        .bg-old { background-color: var(--old-red) !important; color: white !important; }
        .bg-old .status-pill { background: white; color: var(--old-red); }

        .bg-error { background-color: var(--error-grey) !important; color: white !important; }
        .bg-error .status-pill { background: white; color: var(--error-grey); }

        .harvest-label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div style="font-size: 2.5rem; margin-bottom: 5px;">🍌</div>
    <h2>Age Tracker</h2>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="ABC" maxlength="3" autofocus autocomplete="off">
    </div>
    
    <button onclick="checkBanana()" class="btn-main">CALCULATE</button>

    <div id="resBox" class="result-display">
        <span id="emojiDisplay"></span>
        <div id="statusLabel" class="status-pill">Enter Code</div>
        <div id="daysValue">--</div>
        <div style="font-weight: 800; font-size: 0.8rem;">DAYS FROM HARVEST</div>
        
        <div class="harvest-label">
            Harvest Date:<br>
            <span id="dateText" style="font-size: 1rem;">-- -- ----</span>
        </div>
    </div>
    
    <button onclick="clearAll()" class="btn btn-sm btn-link text-muted mt-3 text-decoration-none fw-bold">CLEAR</button>
</div>

<script>
    const inputField = document.getElementById('codeIn');
    inputField.addEventListener('input', () => { if (inputField.value.length === 3) checkBanana(); });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;

        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const days = document.getElementById('daysValue');
        const dateText = document.getElementById('dateText');
        const emoji = document.getElementById('emojiDisplay');

        // VALIDATION CHECK
        const monthChar = val.charCodeAt(0);
        const dayChar = val.charCodeAt(1);
        const yearDigit = val.charAt(2);

        // Check if month is A-L, day is A-Z, and last digit is 1 or 2
        const isMonthValid = (monthChar >= 65 && monthChar <= 76); // A through L
        const isDayValid = (dayChar >= 65 && dayChar <= 90);      // A through Z
        const isYearValid = (yearDigit === '1' || yearDigit === '2');

        if (!isMonthValid || !isDayValid || !isYearValid) {
            box.className = 'result-display bg-error';
            label.innerText = "Invalid Code";
            emoji.innerText = "❓";
            days.innerText = "ERR";
            dateText.innerText = "Check Input";
            return;
        }

        // Calculation logic
        const now = new Date();
        now.setHours(0,0,0,0);

        const m = monthChar - 65;
        let d = dayChar - 64;
        if (yearDigit === '2') d += 26;

        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);

        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        box.className = 'result-display';
        days.innerText = diff;
        dateText.innerText = hDate.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });

        if (diff >= 0 && diff <= 21) {
            label.innerText = "Perfect";
            emoji.innerText = "😃";
            box.classList.add('bg-perfect');
        } else if (diff > 21 && diff <= 31) {
            label.innerText = "Acceptable";
            emoji.innerText = "😐";
            box.classList.add('bg-acceptable');
        } else {
            label.innerText = "Too Old";
            emoji.innerText = "☹️";
            box.classList.add('bg-old');
        }
    }

    function clearAll() {
        inputField.value = '';
        const box = document.getElementById('resBox');
        box.className = 'result-display';
        document.getElementById('statusLabel').innerText = "Enter Code";
        document.getElementById('daysValue').innerText = "--";
        document.getElementById('dateText').innerText = "-- -- ----";
        document.getElementById('emojiDisplay').innerText = "";
        inputField.focus();
    }
</script>
</body>
</html>
