<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Tracker Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --perfect-green: #28a745;
            --acceptable-orange: #fd7e14;
            --old-red: #dc3545;
            --bg-black: #000000;
            --card-grey: #1c1c1e;
            --text-white: #ffffff;
            --border-grey: #3a3a3c;
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            color: var(--text-white);
        }

        .app-card {
            background: var(--card-grey);
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            border-radius: 40px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            width: 92%; max-width: 360px;
            text-align: center; border: 1px solid var(--border-grey);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Banner & Emoji Section */
        .header-section { margin-bottom: 10px; }
        .emoji-header { font-size: 3rem; display: block; margin-bottom: 5px; }
        
        .banner-container {
            width: 100%; max-width: 200px; height: auto;
            margin: 5px auto 10px auto; display: flex; align-items: center; justify-content: center;
        }
        .app-banner { max-width: 100%; max-height: 50px; object-fit: contain; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border-grey);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
        }

        input {
            border: none !important; text-align: center; letter-spacing: 8px;
            font-weight: 900; font-size: 2.8rem !important; background: transparent !important;
            color: var(--text-white); width: 100%; outline: none; text-transform: uppercase;
        }

        .result-display {
            margin-top: 25px; padding: 20px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.05); transition: background-color 0.4s ease;
        }

        .bg-perfect { background-color: var(--perfect-green) !important; }
        .bg-acceptable { background-color: var(--acceptable-orange) !important; }
        .bg-old { background-color: var(--old-red) !important; }
        .bg-error { background-color: #3a3a3c !important; }

        #daysValue { font-size: 5.5rem; font-weight: 900; line-height: 1; }
        
        .harvest-info {
            font-size: 0.8rem; margin-top: 15px; padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1); font-weight: 800; text-transform: uppercase;
        }

        #dateText { display: block; font-size: 1.8rem; font-weight: 900; color: #fff; margin-top: 5px; }

        .btn-main {
            background: #ffffff; color: #000000; border-radius: 50px;
            padding: 16px; font-weight: 800; width: 100%; border: none;
        }
    </style>
</head>
<body>

<div class="app-card" id="appCard">
    <div class="header-section">
        <span class="emoji-header">🍌</span>
        <div class="banner-container">
            <img src="" alt="" class="app-banner" style="display: none;" onload="this.style.display='block'">
        </div>
    </div>

    <h2 style="font-weight:900; letter-spacing: -1px; margin-top: 0;">BANANA TRACKER</h2>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="ABC" maxlength="3" 
               inputmode="text" autocapitalize="characters" autofocus autocomplete="off">
    </div>
    
    <button onclick="checkBanana()" class="btn-main">CALCULATE</button>

    <div id="resBox" class="result-display">
        <div id="statusLabel" style="font-weight:900;">READY</div>
        <div id="daysValue">--</div>
        <div style="font-size: 0.75rem; font-weight:800;">DAYS FROM HARVEST</div>
        
        <div class="harvest-info">
            Harvest Date
            <span id="dateText">-- -- ----</span>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const inputField = document.getElementById('codeIn');
    const card = document.getElementById('appCard');

    inputField.addEventListener('input', () => { 
        if (inputField.value.length === 3) checkBanana(); 
    });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;

        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const daysVal = document.getElementById('daysValue');
        const dateTxt = document.getElementById('dateText');

        const mChar = val.charCodeAt(0);
        const dChar = val.charCodeAt(1);
        const yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            triggerFeedback('error');
            box.className = 'result-display bg-error';
            label.innerText = "INVALID CODE";
            daysVal.innerText = "ERR";
            dateTxt.innerText = "CHECK STICKER";
            return;
        }

        const now = new Date();
        now.setHours(0,0,0,0);
        const m = mChar - 65;
        let d = dChar - 64;
        if (yDigit === '2') d += 26;

        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        daysVal.innerText = diff;
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        dateTxt.innerText = hDate.toLocaleDateString('en-GB', options).toUpperCase();

        box.className = 'result-display'; 

        if (diff > 31) {
            triggerFeedback('error');
            label.innerText = "TOO OLD";
            box.classList.add('bg-old');
        } else if (diff <= 21) {
            triggerFeedback('success');
            label.innerText = "PERFECT";
            box.classList.add('bg-perfect');
        } else {
            triggerFeedback('success');
            label.innerText = "ACCEPTABLE";
            box.classList.add('bg-acceptable');
        }
    }

    function triggerFeedback(type) {
        card.classList.remove('shake');
        void card.offsetWidth; 
        if (type === 'error') card.classList.add('shake');
        if ("vibrate" in navigator) {
            navigator.vibrate(type === 'error' ? [200, 100, 200] : 40);
        }
    }
</script>
</body>
</html>
