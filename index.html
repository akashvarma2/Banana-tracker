<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulp Pro</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- MAIN HUB -->
<div id="middle-hub" class="nav-view">
  <h2>Select Feature</h2>

  <div class="list-btn" id="ageBtn">Age Checker</div>
  <div class="list-btn" id="defectsBtn">Defects</div>
</div>

<!-- DEFECTS HUB -->
<div id="defects-hub" class="nav-view hidden">
  <h2>Select Commodity</h2>

  <div class="selection-grid">
    <div class="selection-card" data-fruit="banana">
      <img src="banana.png">
      <span>Banana</span>
    </div>

    <div class="selection-card" data-fruit="mango">
      <img src="mango.png">
      <span>Mango</span>
    </div>

    <div class="selection-card" data-fruit="avocado">
      <img src="avocado.png">
      <span>Avocado</span>
    </div>
  </div>

  <button id="backToMiddle">← Back</button>
</div>

<!-- APP (AGE CHECKER) -->
<div id="appInterface" class="hidden">
  <input id="codeIn" maxlength="3" placeholder="---" />
  <button id="calcBtn">Calculate</button>

  <div id="resBox" class="hidden">
    <div id="statusLabel"></div>
    <div id="daysValue"></div>
    <div id="dateText"></div>
  </div>

  <button id="backHome">← Back</button>

  <div id="historyList"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
