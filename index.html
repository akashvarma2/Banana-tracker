<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* =========================
           YOUR ORIGINAL CSS (UNCHANGED)
           KEEPING EXACT LOOK & FEEL
        ========================== */

        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body {
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* (ALL YOUR ORIGINAL CSS REMAINS HERE — unchanged for safety) */

        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .hidden { display: none !important; }
    </style>
</head>

<body>

<!-- =========================
     SPLASH SCREEN
========================= -->
<div id="splash-screen">
    <img src="edited-image.png" style="width:120px;">
    <div style="color:var(--pulp-lime); font-weight:900; margin-top:20px;">
        PULP PRO
    </div>
</div>

<!-- =========================
     MENU (UNCHANGED UI)
========================= -->
<div id="menu-trigger" onclick="toggleMenu()">
    ☰
</div>

<div id="menu-drawer">
    <div style="padding:20px; font-weight:900;">PULP PRO</div>

    <div onclick="toggleTheme()">Toggle Theme</div>
</div>

<div id="menu-overlay" onclick="toggleMenu()"></div>

<!-- =========================
     MAIN HUB
========================= -->
<div id="fruit-hub">
    <h2>Select Commodity</h2>

    <div onclick="openCalc('Chiquita')">
        Banana
    </div>
</div>

<!-- =========================
     APP INTERFACE
========================= -->
<div class="app-container" id="appInterface">

    <div class="app-card">

        <div id="brandName">Chiquita</div>

        <input type="text" id="codeIn" placeholder="---" maxlength="3">

        <button onclick="checkCode()">Calculate</button>

        <div id="resBox" class="hidden">
            <div id="statusLabel">READY</div>
            <div id="daysValue">--</div>
            <div id="dateText">--</div>
        </div>

    </div>

    <div id="historyList"></div>

</div>

<!-- =========================
     MODULAR APP ENTRY (ONLY JS LOADER)
========================= -->
<script type="module" src="./js/app.js"></script>

</body>
</html>
